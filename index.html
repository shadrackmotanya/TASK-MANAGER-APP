<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <header>
            <h1>Task Manager App</h1>
            <p class="subtitle">Organize your tasks, track progress, and stay productive </p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="e.g. Complete JavaScript project..."
                aria-label="Task input"
            >
            <button onclick="addTask()">Add Task</button>
        </section>


        <!-- Filter Buttons -->
        <section class="filters">
            <button onclick="filterTasks('all')">All Tasks</button>
            <button onclick="filterTasks('completed')">Completed</button>
            <button onclick="filterTasks('pending')">Pending</button>
        </section>

        <section class="task-info">
            <p>Click ✔ to complete • ✎ to edit • ✖ to delete</p>
        </section>

        <!-- Task List -->
        <section>
            <ul id="taskList"></ul>
        </section>

        <footer>
            <small>Built by Motanya</small>
        </footer>

    </main>

    <script src="script.js"></script>
</body>

</html>
